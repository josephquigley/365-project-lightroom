name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1
          sudo ln -sf /usr/bin/lua5.1 /usr/local/bin/lua

      - name: Run unit tests
        run: bash tests/run_tests.sh
